<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字帖生成器</title>
<style>
:root {
    --bg: #f6f7fb;
    --container-bg: rgba(255,255,255,0.72);
    --text-color: #1e293b;
    --title-color: #0f172a;
    --desc-color: #64748b;
    --accent: #6366f1;
    --accent2: #ec4899;
    --accent3: #f59e0b;
    --border: rgba(15,23,42,0.08);
    --toggle-bg: rgba(255,255,255,0.85);
    --toggle-border: rgba(100,100,100,0.25);
    --shadow-card: 0 10px 30px -10px rgba(15,23,42,0.12);
    --ease-out-soft: cubic-bezier(.25,.8,.25,1);
    --green: #339933;
}
[data-theme='dark'] {
    --bg: #0b1121;
    --container-bg: rgba(20,23,41,0.65);
    --text-color: #e2e8f0;
    --title-color: #f9fafb;
    --desc-color: #94a3b8;
    --border: rgba(148,163,184,0.10);
    --toggle-bg: rgba(22,27,34,0.88);
    --toggle-border: rgba(200,200,220,0.15);
    --shadow-card: 0 14px 40px -10px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 600px at 10% -10%,rgba(99,102,241,0.07) 0%,transparent 60%),
               radial-gradient(900px 500px at 110% 10%,rgba(236,72,153,0.06) 0%,transparent 55%),
               radial-gradient(800px 600px at 50% 110%,rgba(16,185,129,0.05) 0%,transparent 60%),var(--bg);
    background-attachment:fixed;
    color:var(--text-color);line-height:1.7;font-size:15px;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
}
body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(ellipse 60% 50% at 20% 30%,rgba(99,102,241,0.05) 0%,transparent 70%),
               radial-gradient(ellipse 50% 60% at 80% 70%,rgba(236,72,153,0.04) 0%,transparent 70%),
               radial-gradient(ellipse 40% 40% at 50% 50%,rgba(16,185,129,0.03) 0%,transparent 70%);
    animation:aurora 18s ease-in-out infinite alternate;
}
@keyframes aurora{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.06)}}

/* ── 主容器 ── */
.app{
    max-width:900px;margin:0 auto;padding:32px 24px;
    background:var(--container-bg);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-radius:16px;box-shadow:var(--shadow-card);
    min-height:calc(100vh - 64px);
}

/* ── 标题区 ── */
.app-header{text-align:center;padding:8px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.app-header h1{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--title-color);margin-bottom:6px}
.app-header h1 .accent{background:linear-gradient(120deg,#6366f1,#ec4899,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent}
.app-header p{color:var(--desc-color);font-size:13px}

/* ── 控制面板卡片 ── */
.panel{
    background:rgba(99,102,241,0.04);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px 22px;
    margin-bottom:18px;
    transition:box-shadow .3s var(--ease-out-soft);
}
.panel:hover{box-shadow:0 2px 12px rgba(99,102,241,0.06)}
.panel-title{
    display:flex;align-items:center;gap:8px;
    font-weight:700;font-size:14px;color:var(--title-color);
    margin-bottom:14px;
}
.panel-title svg{width:16px;height:16px;fill:none;stroke:var(--accent);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ── 输入控件 ── */
.field-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--desc-color);font-weight:600}
.field input, .field select{
    font-size:14px;padding:8px 12px;
    border:2px solid rgba(99,102,241,0.15);
    border-radius:8px;background:rgba(255,255,255,0.9);
    color:var(--text-color);outline:none;
    transition:border-color .2s,box-shadow .2s;
    font-family:inherit;
}
[data-theme='dark'] .field input,[data-theme='dark'] .field select{background:rgba(30,35,50,0.8);color:var(--text-color)}
.field input:focus,.field select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(99,102,241,0.12);
}
.field input::placeholder{color:var(--desc-color);opacity:0.6}

/* textarea */
textarea#inputText{
    width:100%;min-height:64px;max-height:140px;
    padding:10px 14px;border:2px solid rgba(99,102,241,0.15);
    border-radius:10px;font-size:14px;line-height:1.6;
    resize:vertical;outline:none;
    transition:border-color .2s,box-shadow .2s;
    font-family:'STKaiti','JiangHaoYingBiKaiShu',serif;
    background:rgba(255,255,255,0.9);color:var(--text-color);
}
[data-theme='dark'] textarea#inputText{background:rgba(30,35,50,0.8);color:var(--text-color)}
textarea#inputText:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.12)}

/* ── 按钮 ── */
.btn{
    display:inline-flex;align-items:center;gap:6px;
    font-size:14px;font-weight:600;
    padding:9px 18px;border:none;border-radius:10px;
    cursor:pointer;transition:all .2s var(--ease-out-soft);
    outline:none;user-select:none;font-family:inherit;
    color:#fff;
}
.btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);box-shadow:0 2px 8px rgba(34,197,94,0.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,197,94,0.35)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:linear-gradient(135deg,#64748b 0%,#475569 100%);box-shadow:0 2px 8px rgba(100,116,139,0.2)}
.btn-secondary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(100,116,139,0.3)}
.btn-secondary:active{transform:translateY(0)}
.btn-warm{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);box-shadow:0 2px 8px rgba(245,158,11,0.25)}
.btn-warm:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,158,11,0.35)}
.btn-warm:active{transform:translateY(0)}
.btn-danger{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);box-shadow:0 2px 8px rgba(239,68,68,0.2)}
.btn-danger:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(239,68,68,0.3)}
.btn-danger:active{transform:translateY(0)}
.btn-ghost{background:rgba(99,102,241,0.08);color:var(--accent);border:1px solid rgba(99,102,241,0.2)}
.btn-ghost:hover{background:rgba(99,102,241,0.14)}
.btn-ghost:active{transform:translateY(0)}
[data-theme='dark'] .btn-ghost{background:rgba(129,140,248,0.1);color:#a5b4fc;border-color:rgba(129,140,248,0.2)}

/* ── 按钮行 ── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ── 字数计数器 ── */
.char-counter{font-size:12px;color:var(--desc-color);margin-left:auto;align-self:center}
.char-counter.over{color:#ef4444;font-weight:600}

/* ── 页眉/页脚设置 ── */
.hf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:680px){.hf-grid{grid-template-columns:1fr}}
.hf-field{display:flex;flex-direction:column;gap:4px}
.hf-field label{font-size:12px;color:var(--desc-color);font-weight:600;display:flex;align-items:center;gap:4px}
.hf-field input{
    font-size:13px;padding:7px 11px;
    border:2px solid rgba(99,102,241,0.15);
    border-radius:8px;background:rgba(255,255,255,0.9);
    color:var(--text-color);outline:none;
    transition:border-color .2s;font-family:inherit;
}
[data-theme='dark'] .hf-field input{background:rgba(30,35,50,0.8);color:var(--text-color)}
.hf-field input:focus{border-color:var(--accent)}
.hf-reset{
    font-size:11px;padding:3px 10px;
    background:rgba(239,68,68,0.1);color:#ef4444;
    border:1px solid rgba(239,68,68,0.2);border-radius:6px;
    cursor:pointer;transition:all .2s;outline:none;
}
.hf-reset:hover{background:rgba(239,68,68,0.18)}

/* ── 字帖显示区 ── */
#grid-container{
    display:flex;flex-direction:column;align-items:center;
    margin-top:20px;
}
.row{display:flex;position:relative;width:660px}
.pinyin-row{height:28.8px;display:flex;align-items:center}
.pinyin-cell{width:60px;height:28.8px;display:flex;justify-content:center;align-items:center}
.stroke-container{display:flex;flex-wrap:nowrap;overflow-x:auto;height:28.8px;align-items:center;margin-left:6px}
.stroke-svg{width:18.72px;height:18.72px;margin-right:4.68px;z-index:1}
.pinyin-row.page-first::before{content:'';position:absolute;width:660px;height:0;left:0;top:0;border:0.15px solid var(--green);z-index:0}
.pinyin-row::after{content:'';position:absolute;width:660px;height:0;left:0;bottom:0;border:0.15px solid var(--green);z-index:0}
.pinyin-row .line1,.pinyin-row .line2{content:'';position:absolute;height:0;border:0.15px solid var(--green);z-index:0;opacity:0.25;width:60px;left:0}
.pinyin-row .line1{top:9.6px;border-style:dashed}
.pinyin-row .line2{top:19.2px}
.pinyin-cell span{font-family:'TeXGyreAdventor' !important;font-size:16.8px;position:relative;z-index:1}
.black span{color:black;opacity:1}
.gray span{color:#ccc;opacity:0.35}
.char-row{margin-top:-1px;border-bottom:0.15px solid var(--green)}
.cell{width:60px;height:60px;border-right:0.15px solid var(--green);border-left:0.15px solid var(--green);position:relative;display:flex;justify-content:center;align-items:center;font-size:43.2px}
.cell:not(:first-child){border-left:none}
.char-row .cell{border-top:0.15px solid var(--green)}
.cell::before,.cell::after{content:'';position:absolute;border:0.15px dashed var(--green);z-index:0;opacity:0.5}
.cell::before{width:100%;height:0;top:50%;left:0;transform:translateY(-50%)}
.cell::after{width:0;height:100%;left:50%;top:0;transform:translateX(-50%)}
.diagonal1,.diagonal2{position:absolute;width:80px;height:0;border:0.15px dashed var(--green);z-index:0;opacity:0.25}
.diagonal1{top:0;left:0;transform:rotate(48deg);transform-origin:0 0}
.diagonal2{bottom:0;left:0;transform:rotate(-48deg);transform-origin:0 100%}
.cell span{position:relative;z-index:1}
.tianzi-cell{width:60px;height:60px;position:relative;display:grid;grid-template-columns:repeat(2,30px);grid-template-rows:repeat(2,30px);border:0.15px solid var(--green)}
.tianzi-cell::before,.tianzi-cell::after{content:'';position:absolute;border:0.15px dashed var(--green);opacity:0.5}
.tianzi-cell::before{width:100%;height:0;top:50%;left:0;transform:translateY(-50%)}
.tianzi-cell::after{width:0;height:100%;left:50%;top:0;transform:translateX(-50%)}
.tianzi-cell .sub-cell{display:flex;justify-content:center;align-items:center;font-size:30px;transform:scale(0.9)}
.tianzi-cell .sub-cell.top{font-family:'TeXGyreAdventor',serif;font-size:12px}
.tianzi-cell .black-char{position:absolute;bottom:0;width:30px;height:30px;display:flex;justify-content:center;align-items:center;font-size:24px;color:black;opacity:1;z-index:1}
.tianzi-cell .black-char.left{left:0}
.tianzi-cell .black-char.right{left:30px}
.tianzi-cell .red-char{position:absolute;top:0;left:0;width:60px;height:60px;display:flex;justify-content:center;align-items:center;font-size:43.2px;color:red;opacity:0.06;z-index:1}
.char-row.page-break{page-break-after:always}

@media print{
    .app-header,.panel,#input-container,.fab-theme,.fab-print,.fab-puppeteer,.puppeteer-toast{display:none!important}
    .app{box-shadow:none;backdrop-filter:none;border-radius:0;background:#fff;max-width:100%;padding:0}
    body{background:#fff}
}

/* ── 浮动按钮（主题切换 + 打印） ── */
.fab-theme,.fab-print{
    position:fixed;z-index:9999;
    width:52px;height:52px;border-radius:50%;
    border:2px solid var(--toggle-border);
    background:var(--toggle-bg);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 16px rgba(0,0,0,0.12);
    transition:all .3s var(--ease-out-soft);
    user-select:none;outline:none;color:var(--title-color);
}
.fab-theme{top:20px;right:20px;font-size:22px}
.fab-print{top:84px;right:20px}
.fab-theme:hover,.fab-print:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(0,0,0,0.2)}
.fab-theme:active,.fab-print:active{transform:scale(0.93)}
.fab-print{background:linear-gradient(135deg,#f59e0b,#d97706);border-color:transparent}
.fab-puppeteer{top:148px;right:20px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);border-color:transparent}
.fab-puppeteer:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(139,92,246,0.4)}
.fab-puppeteer:active{transform:scale(0.93)}
.fab-puppeteer svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.fab-puppeteer.busy{animation:pulse 1.2s infinite;pointer-events:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.puppeteer-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;padding:14px 24px;border-radius:10px;background:rgba(15,23,42,0.92);color:#fff;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.3);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);max-width:80vw;text-align:center;transition:all .3s ease}
.puppeteer-toast.error{background:rgba(220,38,38,0.95)}
.puppeteer-toast.success{background:rgba(16,185,129,0.95)}
.puppeteer-toast.info{background:rgba(99,102,241,0.95)}
.fab-print svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* ── 自定义字体上传 ── */
.font-upload-wrap{display:flex;align-items:center;gap:8px}
.font-upload-btn{
    display:inline-flex;align-items:center;gap:5px;
    font-size:12px;padding:6px 12px;
    background:rgba(16,185,129,0.1);color:#10b981;
    border:1px solid rgba(16,185,129,0.25);border-radius:8px;
    cursor:pointer;transition:all .2s;outline:none;font-weight:600;
}
.font-upload-btn:hover{background:rgba(16,185,129,0.18);transform:translateY(-1px)}
.font-upload-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.font-upload-btn input{display:none}

/* ── 滚动条美化 ── */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,0.4)}
</style>
</head>
<body>

<!-- ══ 浮动按钮 ══ -->
<button class="fab-theme" id="themeToggle" aria-label="切换主题" title="点击切换日间/夜间模式">☀</button>
<button class="fab-print" id="printBtn" aria-label="打印/导出PDF" title="打印 / 导出PDF">
    <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
</button>
<button class="fab-puppeteer" id="puppeteerBtn" aria-label="Puppeteer矢量PDF" title="Puppeteer 矢量PDF（需先启动本地服务）">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
</button>

<div class="app">

    <!-- ════════ 标题区 ════════ -->
    <div class="app-header">
        <h1>✏️ <span class="accent">字帖生成器</span></h1>
        <p>输入汉字 → 选择字体 → 生成字帖 → 打印/导出PDF</p>
    </div>

    <!-- ════════ 输入面板 ════════ -->
    <div class="panel" id="input-container">
        <div class="panel-title">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            <span>汉字输入 & 字体选择</span>
        </div>
        <div style="margin-bottom:12px">
            <textarea id="inputText" placeholder="输入要练习的汉字..." maxlength="200">融燕鸳鸯惠崇芦芽短梅溪泛减凑拂集聚形掠偶尔沾倦闲纤痕瓣蓬胀裂姿势仿佛随蹈止录凡距款绸膜瞎益约斑守株待宋耕触颈释骄傲谦虚懦弱恼代价塘映欣赏匀致配传哎叹滔涯妇碌遵循尊验暮吟题侧峰庐缘降阁费须逊旧垒判糊嚷篇翻帘创县设横跨案爪贵智慧历史宫唐西艺术显珍品艳内梦醒苏湿娇嫩强适昆播修致论试验袋证概减阻测括确误途陌缸隙掀背膊察隆暗喂盈锐铛奥努茶甚至躲着退暗丈增鞋履袜套裤肩臂触稍墨染竿腾碎拨浪葫爽硬柿泡熟否垫付替骂虽摸染肩担忍酸廊发痒若娇薄颤巍巅婴希奇皂廊碗若透娇扯仰串越婴希蹦耀演奏琴柔感受激幕临曾经若索悬曾奥探索预测评估损控制裁裂催竟商量纳闷刺颠哄悟肩袖筒缘责榜聪职责颈歪承跌</textarea>
        </div>
        <div class="field-row">
            <div class="field">
                <label>字体</label>
                <div class="font-upload-wrap">
                    <select id="font-select">
                        <option value="JiangHaoYingBiKaiShu" selected>姜浩硬笔楷书</option>
                        <option value="TeXGyreAdventor">TeX Gyre Adventor</option>
                        <option value="STKaiti">华文楷体</option>
                        <option value="FZFSGBK">方正仿宋GBK</option>
                        <option value="FZSJ-DQYBKSJW">方正宋简-大漆硬笔楷</option>
                        <option value="FZSJ-HAITWY">方正宋简-海豚晚云</option>
                        <option value="TW-Kai">文鼎楷体</option>
                        <option value="WoYiQingChenTiKaiShu">我逸清晨体楷书</option>
                        <option value="TianYingZhangKaiShuLight">田英章楷书30Light</option>
                    </select>
                    <label class="font-upload-btn" title="添加自己的字体文件（ttf/otf）">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
                        添加字体
                        <input type="file" id="fontUpload" accept=".ttf,.otf,.woff,.woff2">
                    </label>
                </div>
            </div>
            <div class="btn-row" style="margin-left:auto">
                <button class="btn btn-secondary" id="clear-btn">
                    <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    清除
                </button>
                <button class="btn btn-primary" id="generate-btn">
                    <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
                    生成字帖
                </button>
            </div>
            <span class="char-counter" id="charCounter">0 / 200</span>
        </div>
    </div>

    <!-- ════════ 页眉页脚设置 ════════ -->
    <div class="panel">

function createStrokeSVG(strokes, currentIndex) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", "18.72");
            svg.setAttribute("height", "18.72");
            svg.setAttribute("viewBox", "0 0 1024 1024");
            svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

            const fullCharGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            fullCharGroup.setAttribute("transform", "scale(1, -1) translate(0, -1024)");
            strokes.forEach(stroke => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", stroke.path);
                path.setAttribute("fill", "#ccc");
                fullCharGroup.appendChild(path);
            });
            svg.appendChild(fullCharGroup);

            const completedGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            completedGroup.setAttribute("transform", "scale(1, -1) translate(0, -1024)");
            for (let i = 0; i < currentIndex; i++) {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", strokes[i].path);
                path.setAttribute("fill", "black");
                completedGroup.appendChild(path);
            }
            svg.appendChild(completedGroup);

            if (currentIndex < strokes.length) {
                const currentPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                currentPath.setAttribute("d", strokes[currentIndex].path);
                currentPath.setAttribute("fill", "#ff4444");
                currentPath.setAttribute("transform", "scale(1, -1) translate(0, -1024)");
                svg.appendChild(currentPath);
            }

            return svg;
        }

        function getZuCi(char) {
            try {
                let zuciArray = customZuCi[char] || [];
                if (zuciArray.length >= 2) {
                    return zuciArray.slice(0, 2);
                } else {
                    const words = cnchar.words(char);
                    const twoCharWords = words.filter(word => word.length === 2);
                    if (twoCharWords.length >= 2) {
                        zuciArray = twoCharWords.slice(0, 2);
                    } else {
                        zuciArray = twoCharWords;
                        while (zuciArray.length < 2) {
                            zuciArray.push("组词");
                        }
                    }
                    return zuciArray;
                }
            } catch (error) {
                console.error(`获取 "${char}" 的组词时出错:`, error);
                return ["组词", "组词"];
            }
        }

        function createTianziGrid(char, index) {
            const selectedFont = document.getElementById('font-select').value;
            const tianziCell = document.createElement('div');
            tianziCell.className = 'tianzi-cell';

            const zuciArray = getZuCi(char);

            if (index === 0 || index === 3) {
                // 显示组词（拼音和黑色汉字）
                const targetWord = index === 0 ? zuciArray[0] : zuciArray[1];
                if (targetWord && targetWord.length === 2) {
                    const pinyinArray = [];
                    for (let i = 0; i < targetWord.length; i++) {
                        const py = pinyinPro.pinyin(targetWord[i], {
                            toneType: 'symbol',
                            type: 'array',
                            multiple: false
                        })[0];
                        pinyinArray.push(py);
                    }

                    const charArray = targetWord.split('');

                    const topLeft = document.createElement('div');
                    topLeft.className = 'sub-cell top';
                    topLeft.textContent = pinyinArray[0] || '';

                    const topRight = document.createElement('div');
                    topRight.className = 'sub-cell top';
                    topRight.textContent = pinyinArray[1] || '';

                    const bottomLeft = document.createElement('div');
                    bottomLeft.className = 'black-char left';
                    bottomLeft.style.fontFamily = selectedFont;
                    bottomLeft.textContent = charArray[0] || '';

                    const bottomRight = document.createElement('div');
                    bottomRight.className = 'black-char right';
                    bottomRight.style.fontFamily = selectedFont;
                    bottomRight.textContent = charArray[1] || '';

                    tianziCell.appendChild(topLeft);
                    tianziCell.appendChild(topRight);
                    tianziCell.appendChild(bottomLeft);
                    tianziCell.appendChild(bottomRight);
                }
            } else if (index === 1 || index === 2) {
                // 第一个词组的红色汉字，倒数第五和倒数第四个田字格
                const targetWord = zuciArray[0];
                if (targetWord && targetWord.length === 2) {
                    const charArray = targetWord.split('');
                    const redChar = document.createElement('div');
                    redChar.className = 'red-char';
                    redChar.style.fontFamily = selectedFont;
                    redChar.textContent = index === 1 ? charArray[0] || '' : charArray[1] || '';
                    tianziCell.appendChild(redChar);
                }
            } else if (index === 4 || index === 5) {
                // 第二个词组的红色汉字，最后两个田字格
                const targetWord = zuciArray[1];
                if (targetWord && targetWord.length === 2) {
                    const charArray = targetWord.split('');
                    const redChar = document.createElement('div');
                    redChar.className = 'red-char';
                    redChar.style.fontFamily = selectedFont;
                    redChar.textContent = index === 4 ? charArray[0] || '' : charArray[1] || '';
                    tianziCell.appendChild(redChar);
                }
            }

            return tianziCell;
        }

function generateGrid() {
            const input = document.getElementById('inputText').value;
            const selectedFont = document.getElementById('font-select').value;
            const gridContainer = document.getElementById('grid-container');
            gridContainer.innerHTML = '';

            for (let i = 0; i < input.length; i++) {
                const char = input[i];
                const contextStart = Math.max(0, i - 10);
                const contextEnd = Math.min(input.length, i + 10);
                const context = input.substring(contextStart, contextEnd);
                let pinyin = '';
                try {
                    pinyin = pinyinPro.pinyin(char, {
                        toneType: 'symbol',
                        segment: true,
                        nonZh: 'consecutive'
                    });
                } catch (error) {
                    console.error(`获取 "${char}" 的拼音时出错:`, error);
                    pinyin = '';
                }

                const pinyinRow = document.createElement('div');
                pinyinRow.className = 'row pinyin-row';
                if (i === 0 || i % 11 === 0) {
                    pinyinRow.classList.add('page-first');
                } else {
                    pinyinRow.style.marginTop = '-1px';
                }
                const line1 = document.createElement('div');
                line1.className = 'line1';
                const line2 = document.createElement('div');
                line2.className = 'line2';
                pinyinRow.appendChild(line1);
                pinyinRow.appendChild(line2);

                const pinyinCell = document.createElement('div');
                pinyinCell.className = 'pinyin-cell';
                const span = document.createElement('span');
                span.textContent = pinyin || '';
                span.classList.add('black');
                pinyinCell.appendChild(span);
                pinyinRow.appendChild(pinyinCell);

                const strokeContainer = document.createElement('div');
                strokeContainer.className = 'stroke-container';
                pinyinRow.appendChild(strokeContainer);

                gridContainer.appendChild(pinyinRow);

                const charRow = document.createElement('div');
                charRow.className = 'row char-row';

                for (let j = 0; j < 5; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.fontFamily = selectedFont;
                    const diag1 = document.createElement('div');
                    diag1.className = 'diagonal1';
                    const diag2 = document.createElement('div');
                    diag2.className = 'diagonal2';
                    cell.appendChild(diag1);
                    cell.appendChild(diag2);
                    const span = document.createElement('span');
                    if (j === 0) {
                        span.textContent = char;
                        cell.classList.add('black');
                    } else if (j < 3) {
                        span.textContent = char;
                        cell.classList.add('gray');
                    }
                    cell.appendChild(span);
                    charRow.appendChild(cell);
                }

                // 创建田字格
                for (let k = 0; k < 6; k++) {
                    const tianzi = createTianziGrid(char, k);
                    charRow.appendChild(tianzi);
                }

                if ((i + 1) % 11 === 0) {
                    charRow.classList.add('page-break');
                }
                gridContainer.appendChild(charRow);

                const tempDiv = document.createElement('div');
                document.body.appendChild(tempDiv);
                const writer = new HanziWriter(tempDiv, {
                    width: 60,
                    height: 60,
                    showOutline: false,
                });
                writer.setCharacter(char).then(() => {
                    const strokes = writer._character.strokes;
                    const strokeCount = strokes.length;

                    const strokeCountSpan = document.createElement('span');
                    strokeCountSpan.textContent = `${strokeCount}画`;
                    strokeCountSpan.style.marginRight = '6px';
                    strokeContainer.appendChild(strokeCountSpan);

                    for (let k = 0; k < strokeCount; k++) {
                        const svg = createStrokeSVG(strokes, k);
                        svg.classList.add('stroke-svg');
                        strokeContainer.appendChild(svg);
                    }
                    document.body.removeChild(tempDiv);
                }).catch(error => {
                    console.error(`无法加载汉字"${char}"的笔画数据：`, error);
                });
            }
        }

<!-- Puppeteer Client Script -->
<script>
(function(){
    const SERVER_URL = 'http://localhost:3210';
    const btn = document.getElementById('puppeteerBtn');
    if (!btn) return;

    // 请求计数器，防止重复请求
    let requestInProgress = false;
    let requestId = 0;

    function showToast(msg, type, duration) {
        const existing = document.querySelector('.puppeteer-toast');
        if (existing) existing.remove();
        const t = document.createElement('div');
        t.className = 'puppeteer-toast ' + (type || 'info');
        t.textContent = msg;
        document.body.appendChild(t);
        const dur = duration || 5000;
        setTimeout(function(){ t.style.opacity = '0'; setTimeout(function(){ t.remove(); }, 300); }, dur);
    }

    btn.addEventListener('click', async function() {
        // 双重防抖：布尔变量 + disabled属性
        if (requestInProgress) {
            console.log('[Client] Request already in progress, ignoring click');
            return;
        }
        requestInProgress = true;
        btn.disabled = true;
        btn.style.opacity = '0.6';
        const currentRequestId = ++requestId;
        console.log('[Client] Starting request #' + currentRequestId);

        // Check server health
        let healthy = false;
        try {
            const r = await fetch(SERVER_URL + '/health', { method: 'GET' });
            if (r.ok) healthy = true;
        } catch (e) { healthy = false; }

        if (!healthy) {
            showToast('Puppeteer\u670d\u52a1\u672a\u542f\u52a8\uff01\u8bf7\u5148\u8fd0\u884c \u542f\u52a8Puppeteer.bat (Windows) \u6216 \u542f\u52a8Puppeteer.sh (Linux)', 'error', 8000);
            requestInProgress = false;
            btn.disabled = false;
            btn.style.opacity = '';
            return;
        }

        // Get current text and font
        const textEl = document.getElementById('inputText');
        const text = textEl ? textEl.value : '';
        const fontSelect = document.getElementById('font-select');
        const font = fontSelect ? fontSelect.options[fontSelect.selectedIndex].text : '\u59dc\u6d69\u786c\u7b14\u6977\u4e66';

        if (!text.trim()) {
            showToast('\u8bf7\u5148\u8f93\u5165\u8981\u751f\u6210\u5b57\u5e16\u7684\u6587\u672c', 'error');
            requestInProgress = false;
            btn.disabled = false;
            btn.style.opacity = '';
            return;
        }

        showToast('\u6b63\u5728\u751f\u6210\u77e2\u91cfPDF\uff0c\u8bf7\u7a0d\u5019...', 'info', 30000);

        // 使用 AbortController 设置超时（3分钟）
        const controller = new AbortController();
        const timeoutId = setTimeout(function() {
            controller.abort();
            console.log('[Client] Request #' + currentRequestId + ' timed out');
        }, 180000);

        try {
            const reqBody = JSON.stringify({
                text: text,
                font: font,
                format: 'a4',
                header: '',
                footer: '\u7b2c {page} \u9875 / \u5171 {total} \u9875'
            });
            console.log('[Client] Request #' + currentRequestId + ' body length: ' + reqBody.length + ' chars');

            const r = await fetch(SERVER_URL + '/api/generate-pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=utf-8' },
                body: reqBody,
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            // 204 = 重复请求被跳过（浏览器自动重发），客户端忽略即可
            if (r.status === 204) {
                console.log('[Client] Request #' + currentRequestId + ' skipped by server (duplicate)');
                return;
            }

            if (!r.ok) {
                let errMsg = '\u672a\u77e5\u9519\u8bef';
                try { const err = await r.json(); errMsg = err.error || errMsg; } catch(e) {}
                showToast('PDF\u751f\u6210\u5931\u8d25: ' + errMsg, 'error', 8000);
                return;
            }

            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
            a.download = '\u5b57\u5e16_' + ts + '.pdf';
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            showToast('\u77e2\u91cfPDF\u751f\u6210\u6210\u529f\uff01', 'success');
        } catch (e) {
            clearTimeout(timeoutId);
            if (e.name === 'AbortError') {
                showToast('\u8bf7\u6c42\u8d85\u65f6\uff0c\u8bf7\u91cd\u8bd5', 'error', 8000);
            } else {
                showToast('\u8bf7\u6c42\u5931\u8d25: ' + e.message, 'error', 8000);
            }
        } finally {
            requestInProgress = false;
            btn.disabled = false;
            btn.style.opacity = '';
            console.log('[Client] Request #' + currentRequestId + ' completed');
        }
    });
})();
</script>

<!-- Puppeteer Server Code (embedded, extracted by launcher scripts) -->
<script type="text/nodejs" id="puppeteer-server-code">
// PUPPETEER_SERVER_BEGIN
const http = require('http');
const path = require('path');
const fs = require('fs');
const os = require('os');
const { exec } = require('child_process');

const PORT = 3210;
const HTML_DIR = process.env.PUPPETEER_HTML_DIR || __dirname;
const HTML_PATH = path.join(HTML_DIR, '\u5b57\u5e16\u751f\u6210\u5668.html');

function loadPuppeteer() {
    const paths = [
        path.join(HTML_DIR, 'node_modules', 'puppeteer'),
        path.join(HTML_DIR, '..', 'node_modules', 'puppeteer'),
        'puppeteer',
    ];
    for (const p of paths) {
        try { return require(p); } catch (e) {}
    }
    throw new Error('puppeteer module not found. Run: cd "' + HTML_DIR + '" && npm install puppeteer');
}

const puppeteer = loadPuppeteer();

function findChrome() {
    const candidates = [];
    const cacheDir = path.join(os.homedir(), '.cache', 'puppeteer', 'chrome');
    if (fs.existsSync(cacheDir)) {
        try {
            const versions = fs.readdirSync(cacheDir);
            for (const v of versions) {
                const exe = path.join(cacheDir, v, 'chrome-win64', 'chrome.exe');
                if (fs.existsSync(exe)) candidates.push(exe);
                const exeMac = path.join(cacheDir, v, 'chrome-darwin', 'Google Chrome for Testing.app', 'Contents', 'MacOS', 'Google Chrome for Testing');
                if (fs.existsSync(exeMac)) candidates.push(exeMac);
                const exeLinux = path.join(cacheDir, v, 'chrome-linux64', 'chrome');
                if (fs.existsSync(exeLinux)) candidates.push(exeLinux);
            }
        } catch (e) {}
    }
    const sysChrome = [
        path.join(process.env.PROGRAMFILES || '', 'Google', 'Chrome', 'Application', 'chrome.exe'),
        path.join(process.env['PROGRAMFILES(X86)'] || '', 'Google', 'Chrome', 'Application', 'chrome.exe'),
        path.join(process.env.LOCALAPPDATA || '', 'Google', 'Chrome', 'Application', 'chrome.exe'),
        '/usr/bin/google-chrome',
        '/usr/bin/chromium',
        '/usr/bin/chromium-browser',
        '/Applications/Google Chrome.app/Contents/MacOS/Google Chrome',
    ];
    for (const p of sysChrome) { if (p && fs.existsSync(p)) candidates.push(p); }
    const sysEdge = [
        path.join(process.env.PROGRAMFILES || '', 'Microsoft', 'Edge', 'Application', 'msedge.exe'),
        path.join(process.env['PROGRAMFILES(X86)'] || '', 'Microsoft', 'Edge', 'Application', 'msedge.exe'),
    ];
    for (const p of sysEdge) { if (p && fs.existsSync(p)) candidates.push(p); }
    return candidates.length > 0 ? candidates[0] : null;
}

function openBrowser(url) {
    const cmd = process.platform === 'win32' ? 'start "" "' + url + '"' :
                process.platform === 'darwin' ? 'open "' + url + '"' :
                'xdg-open "' + url + '"';
    exec(cmd);
}

// 安全JSON解析：当浏览器在keep-alive连接上发送重复请求时，body可能包含多个JSON对象
// 本函数仅解析第一个完整的JSON对象，忽略后续内容
function safeJsonParse(str) {
    str = str.trim();
    if (!str) throw new Error('Empty body');
    if (str.charAt(0) !== '{') throw new Error('Body does not start with "{" (first char: ' + str.charCodeAt(0) + ')');
    // 快速路径：直接尝试解析
    try {
        return JSON.parse(str);
    } catch (e) {
        // 慢速路径：手动匹配第一个完整的JSON对象（处理大括号嵌套和字符串转义）
        console.warn('[Server] Direct JSON.parse failed (' + e.message + '), trying to extract first JSON object from ' + str.length + ' chars');
        let depth = 0, inString = false, escape = false;
        for (let i = 0; i < str.length; i++) {
            const c = str.charAt(i);
            if (escape) { escape = false; continue; }
            if (c === '\\') { escape = true; continue; }
            if (c === '"') { inString = !inString; continue; }
            if (inString) continue;
            if (c === '{') depth++;
            else if (c === '}') {
                depth--;
                if (depth === 0) {
                    const first = str.substring(0, i + 1);
                    console.log('[Server] Extracted first JSON object: ' + first.length + ' chars, ignoring ' + (str.length - i - 1) + ' trailing chars');
                    return JSON.parse(first);
                }
            }
        }
        throw e;
    }
}

// 请求去重状态：防止浏览器在keep-alive连接上重复发送相同请求
let lastRequest = { key: '', active: false };

const server = http.createServer(async (req, res) => {
    // 全局请求日志：记录所有请求的URL和方法
    console.log('[Server] ' + req.method + ' ' + req.url + ' from ' + (req.headers['user-agent'] || 'unknown').substring(0, 50));

    res.setHeader('Access-Control-Allow-Origin', '*');
    res.setHeader('Access-Control-Allow-Methods', 'GET, POST, OPTIONS');
    res.setHeader('Access-Control-Allow-Headers', 'Content-Type');
    // 强制关闭keep-alive，防止浏览器在同一连接上发送重复请求导致body合并
    res.setHeader('Connection', 'close');
    if (req.method === 'OPTIONS') { res.writeHead(204); res.end(); return; }

    // Health check
    if (req.url === '/health') {
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ ok: true, chrome: !!findChrome() }));
        return;
    }

    // Serve HTML page
    if (req.url === '/' || req.url === '/index.html') {
        try {
            const htmlContent = fs.readFileSync(HTML_PATH, 'utf-8');
            res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
            res.end(htmlContent);
        } catch (e) {
            res.writeHead(500, { 'Content-Type': 'text/plain' });
            res.end('Error loading HTML: ' + e.message);
        }
        return;
    }

    // Serve fonts
    if (req.url.startsWith('/fonts/')) {
        const filePath = path.join(HTML_DIR, decodeURIComponent(req.url));
        if (fs.existsSync(filePath) && fs.statSync(filePath).isFile()) {
            const ext = path.extname(filePath).toLowerCase();
            const types = { '.ttf': 'font/ttf', '.otf': 'font/otf', '.woff': 'font/woff', '.woff2': 'font/woff2' };
            res.writeHead(200, { 'Content-Type': types[ext] || 'application/octet-stream' });
            fs.createReadStream(filePath).pipe(res);
            return;
        }
    }

    // Generate PDF
    if (req.url === '/api/generate-pdf' && req.method === 'POST') {
        const chunks = [];
        req.on('data', chunk => chunks.push(chunk));
        req.on('end', async () => {
            try {
                const body = Buffer.concat(chunks).toString('utf-8');
                console.log('[Server] Request body length: ' + body.length + ' chars, ' + Buffer.concat(chunks).length + ' bytes');
                const opts = safeJsonParse(body);
                console.log('[Server] JSON parsed OK: text=' + (opts.text || '').length + ' chars, font=' + (opts.font || ''));

                // 请求去重：如果相同text的请求正在处理中，跳过（防止浏览器重复发送）
                const reqKey = (opts.text || '').substring(0, 100) + '|' + (opts.font || '');
                if (lastRequest.key === reqKey && lastRequest.active) {
                    console.log('[Server] Duplicate request detected (same text in progress), skipping');
                    res.writeHead(204);
                    res.end();
                    return;
                }
                lastRequest = { key: reqKey, active: true };
                const chromePath = findChrome();
                if (!chromePath) {
                    res.writeHead(500, { 'Content-Type': 'application/json' });
                    res.end(JSON.stringify({ error: 'Chrome/Chromium not found' }));
                    return;
                }
                console.log('[Server] Launching browser: ' + chromePath);
                const browser = await puppeteer.launch({
                    headless: 'new',
                    executablePath: chromePath,
                    args: ['--no-sandbox', '--disable-setuid-sandbox', '--font-render-hinting=none', '--disable-font-subpixel-positioning'],
                });
                try {
                    const page = await browser.newPage();
                    const fileUrl = 'file:///' + HTML_PATH.replace(/\\/g, '/');
                    console.log('[Server] Loading: ' + fileUrl);
                    // 策略：先尝试 networkidle0（最可靠），超时则降级为 domcontentloaded
                    try {
                        await page.goto(fileUrl, { waitUntil: 'networkidle0', timeout: 45000 });
                    } catch (navErr) {
                        console.warn('[Server] networkidle0 timeout, falling back to domcontentloaded...');
                        await page.goto(fileUrl, { waitUntil: 'domcontentloaded', timeout: 30000 });
                    }

                    console.log('[Server] Setting text: ' + (opts.text || '').substring(0, 30) + '...');
                    // 第一步：同步设置文本和字体（不在此处等待，避免竞态）
                    await page.evaluate((text, font) => {
                        const ta = document.getElementById('inputText');
                        if (ta) ta.value = text;
                        const fs2 = document.getElementById('font-select');
                        if (fs2) {
                            for (let i = 0; i < fs2.options.length; i++) {
                                if (fs2.options[i].text.includes(font) || fs2.options[i].value === font) {
                                    fs2.selectedIndex = i;
                                    fs2.dispatchEvent(new Event('change'));
                                    break;
                                }
                            }
                        }
                        if (typeof generateGrid === 'function') generateGrid();
                    }, opts.text || '', opts.font || '\u59dc\u6d69\u786c\u7b14\u6977\u4e66');

                    // 第二步：等待网格渲染完成
                    await page.waitForSelector('#grid-container .page', { timeout: 15000 }).catch(() => {
                        console.warn('[Server] Grid container not detected, continuing...');
                    });

                    // 第三步：主动注入字体加载逻辑，确保汉字和拼音字体完全就绪
                    console.log('[Server] Loading fonts explicitly...');
                    await page.evaluate(async () => {
                        // 等待 CSS @font-face 字体加载
                        await document.fonts.ready;
                        await new Promise(r => setTimeout(r, 2000));
                        await document.fonts.ready;

                        // 验证拼音字体（TeXGyreAdventor，base64内嵌）
                        var pinyinOk = document.fonts.check('16px TeXGyreAdventor');
                        // 验证汉字字体
                        var cnFont = document.getElementById('font-select') ? document.getElementById('font-select').value : 'JiangHaoYingBiKaiShu';
                        var cnOk = document.fonts.check('16px ' + cnFont);

                        if (!pinyinOk || !cnOk) {
                            console.warn('Fonts not ready: pinyin=' + pinyinOk + ', cn=' + cnOk + ', retrying...');
                            // 额外等待5秒让字体加载完成
                            await new Promise(r => setTimeout(r, 5000));
                            await document.fonts.ready;
                        }

                        // 最终验证
                        var pinyinFinal = document.fonts.check('16px TeXGyreAdventor');
                        var cnFinal = document.fonts.check('16px ' + cnFont);
                        console.log('Font status: pinyin=' + pinyinFinal + ', cn=' + cnFinal);
                    });

                    // 第四步：切换到打印模式
                    await page.emulateMediaType('print');
                    await new Promise(r => setTimeout(r, 500));

                    console.log('[Server] Generating PDF...');
                    const pdfBuffer = await page.pdf({
                        format: opts.format || 'a4',
                        printBackground: true,
                        landscape: opts.landscape || false,
                        margin: { top: '10mm', bottom: '10mm', left: '10mm', right: '10mm' },
                        displayHeaderFooter: !!(opts.header || opts.footer),
                        headerTemplate: opts.header ? '<div style="font-size:9px;width:100%;text-align:center;color:#666;padding:0 10mm;font-family:sans-serif;">' + opts.header + '</div>' : '<div></div>',
                        footerTemplate: opts.footer ? '<div style="font-size:9px;width:100%;text-align:center;color:#666;padding:0 10mm;font-family:sans-serif;">' + opts.footer.replace('{page}', '<span class="pageNumber"></span>').replace('{total}', '<span class="totalPages"></span>') + '</div>' : '<div></div>',
                    });

                    console.log('[Server] PDF generated: ' + pdfBuffer.length + ' bytes');
                    res.writeHead(200, { 'Content-Type': 'application/pdf' });
                    res.end(pdfBuffer);
                } finally {
                    await browser.close();
                }
            } catch (e) {
                console.error('[Server] Error:', e.message);
                console.error('[Server] Body preview (first 400 chars):', body.substring(0, 400));
                console.error('[Server] Body length:', body.length);
                console.error('[Server] Request from:', req.headers['user-agent'] || 'unknown');
                if (!res.headersSent) {
                    res.writeHead(400, { 'Content-Type': 'application/json' });
                    res.end(JSON.stringify({ error: e.message }));
                }
            } finally {
                // 清除去重状态，允许后续相同内容的请求
                lastRequest.active = false;
            }
        });
        return;
    }

    res.writeHead(404, { 'Content-Type': 'text/plain' });
    res.end('Not found');
});

server.listen(PORT, () => {
    console.log('=============================================');
    console.log('  Puppeteer PDF Server Started');
    console.log('  Port: ' + PORT);
    console.log('  HTML: ' + HTML_PATH);
    console.log('  Chrome: ' + (findChrome() || 'NOT FOUND'));
    console.log('=============================================');
    console.log('');
    console.log('  Browser will open automatically.');
    console.log('  Click the purple button in the page to generate vector PDF.');
    console.log('  Press Ctrl+C to stop the server.');
    console.log('');
    openBrowser('http://localhost:' + PORT + '/');
});

server.on('error', (e) => {
    if (e.code === 'EADDRINUSE') {
        console.error('ERROR: Port ' + PORT + ' is already in use. Close other instances and retry.');
    } else {
        console.error('Server error:', e.message);
    }
    process.exit(1);
});
// PUPPETEER_SERVER_END

</script>
